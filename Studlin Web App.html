<style>
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; height: 100%; background: #0D120F; overflow: hidden; }
  body { font-family: "Geist", -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif; -webkit-font-smoothing: antialiased; text-rendering: optimizeLegibility; color: #E8EFE7; }
  ::selection { background: rgba(174,206,94,0.30); }
  ::-webkit-scrollbar { width: 9px; height: 9px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.08); border-radius: 99px; border: 2px solid transparent; background-clip: padding-box; }
  ::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.18); background-clip: padding-box; }
  input[type="range"] { -webkit-appearance: none; appearance: none; height: 4px; background: rgba(255,255,255,0.10); border-radius: 2px; outline: none; }
  input[type="range"]::-webkit-slider-thumb { -webkit-appearance: none; appearance: none; width: 15px; height: 15px; border-radius: 50%; background: #AECE5E; cursor: pointer; border: 2px solid #0D120F; box-shadow: 0 2px 8px -2px rgba(174,206,94,0.6); }
  button:active { transform: scale(0.985); }
  button { transition: opacity 0.16s ease, transform 0.12s ease, background 0.18s ease, border-color 0.18s ease, box-shadow 0.2s ease; }
  input, textarea, select { transition: border-color 0.18s ease, background 0.18s ease, box-shadow 0.2s ease; }
  input:focus, textarea:focus, select:focus { border-color: rgba(174,206,94,0.45) !important; box-shadow: 0 0 0 3px rgba(174,206,94,0.10); }
  @keyframes studlinRise { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: none; } }
  @keyframes studlinFade { from { opacity: 0; } to { opacity: 1; } }
  @keyframes studlinPulse { 0%,100% { opacity: 0.4; } 50% { opacity: 1; } }
  @keyframes studlinPop { from { opacity: 0; transform: scale(0.96) translateY(4px); } to { opacity: 1; transform: none; } }
  @keyframes studlinSpin { to { transform: rotate(360deg); } }
</style>
